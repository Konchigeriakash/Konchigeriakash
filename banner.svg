<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050A14;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0A1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#060C1A;stop-opacity:1" />
    </linearGradient>

    <!-- Blue glow gradient -->
    <radialGradient id="glowBlue" cx="30%" cy="50%" r="45%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:0" />
    </radialGradient>

    <!-- Cyan glow gradient -->
    <radialGradient id="glowCyan" cx="75%" cy="40%" r="35%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:0" />
    </radialGradient>

    <!-- Text gradient -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E2E8F0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CBD5E1;stop-opacity:1" />
    </linearGradient>

    <!-- Cyan accent gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38BDF8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#67E8F9;stop-opacity:1" />
    </linearGradient>

    <!-- Glass card gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.01" />
    </linearGradient>

    <!-- Line glow filter -->
    <filter id="blueGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft text shadow -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="roundedClip">
      <rect width="900" height="300" rx="16" ry="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" rx="16" ry="16" fill="url(#bgGrad)"/>

  <!-- Ambient glows -->
  <rect width="900" height="300" rx="16" ry="16" fill="url(#glowBlue)" clip-path="url(#roundedClip)"/>
  <rect width="900" height="300" rx="16" ry="16" fill="url(#glowCyan)" clip-path="url(#roundedClip)"/>

  <!-- Grid lines (subtle) -->
  <g clip-path="url(#roundedClip)" opacity="0.04">
    <line x1="0" y1="60" x2="900" y2="60" stroke="#38BDF8" stroke-width="1"/>
    <line x1="0" y1="120" x2="900" y2="120" stroke="#38BDF8" stroke-width="1"/>
    <line x1="0" y1="180" x2="900" y2="180" stroke="#38BDF8" stroke-width="1"/>
    <line x1="0" y1="240" x2="900" y2="240" stroke="#38BDF8" stroke-width="1"/>
    <line x1="150" y1="0" x2="150" y2="300" stroke="#38BDF8" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="300" stroke="#38BDF8" stroke-width="1"/>
    <line x1="450" y1="0" x2="450" y2="300" stroke="#38BDF8" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="300" stroke="#38BDF8" stroke-width="1"/>
    <line x1="750" y1="0" x2="750" y2="300" stroke="#38BDF8" stroke-width="1"/>
  </g>

  <!-- Floating code snippets (left side) -->
  <g clip-path="url(#roundedClip)" opacity="0.18" font-family="'Courier New', monospace" font-size="11">
    <text x="24" y="48" fill="#38BDF8">const dev = {</text>
    <text x="24" y="65" fill="#67E8F9">  name: <tspan fill="#A5F3FC">"Akash"</tspan>,</text>
    <text x="24" y="82" fill="#67E8F9">  role: <tspan fill="#A5F3FC">"Full Stack"</tspan>,</text>
    <text x="24" y="99" fill="#67E8F9">  stack: <tspan fill="#A5F3FC">["React",</tspan></text>
    <text x="24" y="116" fill="#A5F3FC">         "Spring", "Java"],</text>
    <text x="24" y="133" fill="#38BDF8">};</text>
  </g>

  <!-- Floating code snippets (right side) -->
  <g clip-path="url(#roundedClip)" opacity="0.15" font-family="'Courier New', monospace" font-size="11">
    <text x="700" y="170" fill="#67E8F9">// build cool things</text>
    <text x="700" y="187" fill="#38BDF8">@SpringBootApp</text>
    <text x="700" y="204" fill="#E2E8F0">public class <tspan fill="#67E8F9">Dev</tspan> {</text>
    <text x="700" y="221" fill="#E2E8F0">  passion = <tspan fill="#A5F3FC">true</tspan>;</text>
    <text x="700" y="238" fill="#E2E8F0">}</text>
  </g>

  <!-- Geometric accent shapes -->
  <!-- Top-right corner circle -->
  <circle cx="820" cy="55" r="70" fill="none" stroke="#0EA5E9" stroke-width="0.6" opacity="0.25" clip-path="url(#roundedClip)"/>
  <circle cx="820" cy="55" r="45" fill="none" stroke="#22D3EE" stroke-width="0.4" opacity="0.18" clip-path="url(#roundedClip)"/>

  <!-- Bottom-left accent -->
  <circle cx="80" cy="260" r="50" fill="none" stroke="#0284C7" stroke-width="0.5" opacity="0.2" clip-path="url(#roundedClip)"/>

  <!-- Central floating dots -->
  <circle cx="455" cy="38" r="1.5" fill="#38BDF8" opacity="0.6"/>
  <circle cx="470" cy="55" r="1" fill="#67E8F9" opacity="0.5"/>
  <circle cx="440" cy="62" r="1" fill="#22D3EE" opacity="0.4"/>

  <!-- Glowing horizontal accent line -->
  <line x1="260" y1="200" x2="640" y2="200" stroke="url(#cyanGrad)" stroke-width="0.8" opacity="0.35" filter="url(#blueGlow)"/>

  <!-- Main name text -->
  <text
    x="450"
    y="128"
    text-anchor="middle"
    font-family="'Segoe UI', 'Inter', 'SF Pro Display', system-ui, sans-serif"
    font-size="46"
    font-weight="700"
    letter-spacing="-0.5"
    fill="url(#nameGrad)"
    filter="url(#textGlow)"
  >Akash S Konchigeri</text>

  <!-- Subtitle with cyan accent -->
  <text
    x="450"
    y="168"
    text-anchor="middle"
    font-family="'Segoe UI', 'Inter', 'SF Pro Display', system-ui, sans-serif"
    font-size="18"
    font-weight="400"
    letter-spacing="3"
    fill="url(#cyanGrad)"
    opacity="0.9"
  >FULL STACK DEVELOPER</text>

  <!-- Thin separator line under subtitle -->
  <line x1="360" y1="183" x2="540" y2="183" stroke="#38BDF8" stroke-width="0.6" opacity="0.4"/>

  <!-- Status pill -->
  <rect x="370" y="218" width="160" height="28" rx="14" fill="#FFFFFF" fill-opacity="0.04" stroke="#38BDF8" stroke-width="0.8" stroke-opacity="0.5"/>
  <!-- Online dot -->
  <circle cx="393" cy="232" r="4" fill="#22D3EE" opacity="0.9"/>
  <circle cx="393" cy="232" r="6" fill="#22D3EE" opacity="0.2"/>
  <text x="405" y="237" font-family="'Segoe UI', 'Inter', system-ui, sans-serif" font-size="12" font-weight="500" fill="#94A3B8" letter-spacing="0.5">Open to Collaborate</text>

  <!-- Border glow -->
  <rect width="900" height="300" rx="16" ry="16" fill="none" stroke="url(#cyanGrad)" stroke-width="1" opacity="0.2"/>
</svg>
